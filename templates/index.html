<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Traffic Sign Recognition</title>

  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>

  <div class="road">
    <div class="lane-marking" aria-hidden="true"></div>

    <main class="panel">
      <div class="eyebrow">
        <span class="dash" aria-hidden="true"></span>
        <span>Automated Sign Classification</span>
        <span class="dash" aria-hidden="true"></span>
      </div>

      <h1>Traffic Sign <span>Recognition</span></h1>
      <p class="subtitle">Drop a photo of a road sign. The model reads it and reports back with a confidence score.</p>

      <form id="predict-form">
        <label class="scan-zone" id="scan-zone" for="image">
          <span class="corner tl" aria-hidden="true"></span>
          <span class="corner tr" aria-hidden="true"></span>
          <span class="corner bl" aria-hidden="true"></span>
          <span class="corner br" aria-hidden="true"></span>

          <input type="file" id="image" accept="image/png, image/jpeg" hidden>

          <img id="preview" alt="Selected traffic sign preview">

          <div class="scan-prompt" id="scan-prompt">
            <svg width="34" height="34" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M12 16V4M12 4L7 9M12 4L17 9" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <p class="scan-title">Drag a photo here</p>
            <p class="scan-hint">or click to browse &middot; PNG, JPG</p>
          </div>
        </label>

        <p class="form-message" id="form-message" role="status"></p>

        <button type="submit" id="analyze-btn">
          <span class="btn-label">Analyze sign</span>
          <span class="btn-spinner" aria-hidden="true"></span>
        </button>
      </form>

      <section id="result" class="result hidden" aria-live="polite">
        <div class="result-row">
          <span class="result-tag" id="result-tag">Detected</span>
          <h2 id="prediction"></h2>
        </div>

        <div class="gauge">
          <div class="gauge-track">
            <div class="gauge-fill" id="gauge-fill"></div>
            <div class="gauge-ticks" aria-hidden="true"></div>
          </div>
          <span class="gauge-label" id="confidence"></span>
        </div>
      </section>

      <div class="footer-divider" aria-hidden="true"></div>
      <p class="footer-note">Predictions are model estimates &mdash; always confirm against the physical sign.</p>
    </main>
  </div>

  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
